[files]
extend-exclude = ["/CHANGELOG.md", "data/filetypes/base.lua"]

[default.extend-words]
noice = "noice"
fo = "fo"
ba = "ba"
ue = "ue"
# bloom-filter false-positive rate (used in ffs-symbol/src/bloom.rs)
fpr = "fpr"
FPR = "FPR"
# file extensions that look like typos
thm = "thm"
# some typos we use for tests
comparsion = "comparsion"
modfiers = "modfiers"
shcema = "shcema"
# Intentional typo in `ffs find` fuzzy-fallback doc comment / tests to
# demonstrate that "isntall.sh" resolves to "install.sh".
isntall = "isntall"
# Vietnamese: word meaning "change/replace". Appears in design docs and
# inline commit-message context.
thay = "thay"

[default]
extend-ignore-re = [
  # git commit hashes in CHANGELOG.md
  "\\[[0-9a-f]{7}\\]",
  # Line ignore with trailing # spellchecker:disable-line
  "(?Rm)^.*(#|--|//)\\s*spellchecker:disable-line$",
  # Line block with # spellchecker:<on|off>
  "(?s)(#|--|//|)\\s*spellchecker:off.*?\\n\\s*(#|--|//)\\s*spellchecker:on",
  # Vim doc formatting
  "vim:.+:"
]
