name: Prebuild

on:
  push:
    branches: [main, fix/download-version]
    tags:
      - "v*"
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-c:
    name: Build C FFI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          ## Linux builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.31
            artifact_name: target/x86_64-unknown-linux-gnu/ci/libffs_c.so
            lib_filename: libffs_c.so
            ext: so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.31
            artifact_name: target/aarch64-unknown-linux-gnu/ci/libffs_c.so
            lib_filename: libffs_c.so
            ext: so
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: target/x86_64-unknown-linux-musl/ci/libffs_c.so
            lib_filename: libffs_c.so
            ext: so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: target/aarch64-unknown-linux-musl/ci/libffs_c.so
            lib_filename: libffs_c.so
            ext: so

          ## Android (Termux)
          - os: ubuntu-latest
            target: aarch64-linux-android
            artifact_name: target/aarch64-linux-android/ci/libffs_c.so
            lib_filename: libffs_c.so
            ext: so

          ## macOS builds
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: target/x86_64-apple-darwin/ci/libffs_c.dylib
            lib_filename: libffs_c.dylib
            ext: dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: target/aarch64-apple-darwin/ci/libffs_c.dylib
            lib_filename: libffs_c.dylib
            ext: dylib

          ## Windows builds
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: target/x86_64-pc-windows-msvc/ci/ffs_c.dll
            lib_filename: ffs_c.dll
            ext: dll
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: target/aarch64-pc-windows-msvc/ci/ffs_c.dll
            lib_filename: ffs_c.dll
            ext: dll

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Remove Git link.exe conflict
        if: contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          $gitLink = "C:\Program Files\Git\usr\bin\link.exe"
          if (Test-Path $gitLink) { Rename-Item $gitLink "link.exe.bak" }

      - name: Determine version
        id: version
        run: bash scripts/determine-version.sh

      - name: Set version
        run: make set-version V="${{ steps.version.outputs.version }}"

      - name: Install Rust
        run: rustup target add ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        if: contains(matrix.os, 'ubuntu')
        run: cargo install cargo-zigbuild

      - name: Build for Linux
        if: contains(matrix.os, 'ubuntu') && !contains(matrix.target, 'android')
        run: |
          cargo zigbuild --profile ci --target ${{ matrix.zigbuild_target || matrix.target }} -p ffs-c --features zlob
          mv "${{ matrix.artifact_name }}" "c-lib-${{ matrix.target }}.${{ matrix.ext }}"

      - name: Build for Android (Termux)
        if: contains(matrix.target, 'android')
        run: |
          NDK_BIN="$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"

          export CC_aarch64_linux_android="$NDK_BIN/aarch64-linux-android24-clang"
          export CXX_aarch64_linux_android="$NDK_BIN/aarch64-linux-android24-clang++"
          export AR_aarch64_linux_android="$NDK_BIN/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$NDK_BIN/aarch64-linux-android24-clang"

          cargo build --profile ci --target ${{ matrix.target }} -p ffs-c --features zlob
          mv "${{ matrix.artifact_name }}" "c-lib-${{ matrix.target }}.${{ matrix.ext }}"

      - name: Build for macOS
        if: contains(matrix.os, 'macos')
        run: |
          MACOSX_DEPLOYMENT_TARGET="13" cargo build --profile ci --target ${{ matrix.target }} -p ffs-c --features zlob
          mv "${{ matrix.artifact_name }}" "c-lib-${{ matrix.target }}.${{ matrix.ext }}"

      - name: Ad-hoc sign macOS binary
        if: contains(matrix.os, 'macos')
        run: codesign --force --sign - "c-lib-${{ matrix.target }}.${{ matrix.ext }}"

      - name: Build for Windows
        if: contains(matrix.os, 'windows')
        shell: bash
        run: |
          cargo build --profile ci --target ${{ matrix.target }} -p ffs-c --features zlob
          mv "${{ matrix.artifact_name }}" "c-lib-${{ matrix.target }}.${{ matrix.ext }}"

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-lib-${{ matrix.target }}
          path: c-lib-${{ matrix.target }}.*

  build-mcp:
    name: Build MCP ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          ## Linux builds (using cargo-zigbuild)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.31
            artifact_name: target/x86_64-unknown-linux-gnu/ci/ffs-mcp
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.31
            artifact_name: target/aarch64-unknown-linux-gnu/ci/ffs-mcp
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: target/x86_64-unknown-linux-musl/ci/ffs-mcp
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: target/aarch64-unknown-linux-musl/ci/ffs-mcp

          ## macOS builds
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: target/x86_64-apple-darwin/ci/ffs-mcp
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: target/aarch64-apple-darwin/ci/ffs-mcp

          ## Windows builds
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: target/x86_64-pc-windows-msvc/ci/ffs-mcp.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: target/aarch64-pc-windows-msvc/ci/ffs-mcp.exe

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Remove Git link.exe conflict
        if: contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          $gitLink = "C:\Program Files\Git\usr\bin\link.exe"
          if (Test-Path $gitLink) { Rename-Item $gitLink "link.exe.bak" }

      - name: Determine version
        id: version
        run: bash scripts/determine-version.sh

      - name: Set version
        run: make set-version V="${{ steps.version.outputs.version }}"

      - name: Install Rust
        run: rustup target add ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        if: contains(matrix.os, 'ubuntu')
        run: cargo install cargo-zigbuild

      - name: Build for Linux
        if: contains(matrix.os, 'ubuntu')
        run: |
          cargo zigbuild --profile ci --target ${{ matrix.zigbuild_target || matrix.target }} -p ffs-mcp --features zlob
          cp "${{ matrix.artifact_name }}" "ffs-mcp-${{ matrix.target }}"

      - name: Build for macOS
        if: contains(matrix.os, 'macos')
        run: |
          MACOSX_DEPLOYMENT_TARGET="13" cargo build --profile ci --target ${{ matrix.target }} -p ffs-mcp --features zlob
          cp "${{ matrix.artifact_name }}" "ffs-mcp-${{ matrix.target }}"

      - name: Ad-hoc sign macOS binary
        if: contains(matrix.os, 'macos')
        run: codesign --force --sign - "ffs-mcp-${{ matrix.target }}"

      - name: Build for Windows
        if: contains(matrix.os, 'windows')
        shell: bash
        run: |
          cargo build --profile ci --target ${{ matrix.target }} -p ffs-mcp --features zlob
          cp "${{ matrix.artifact_name }}" "ffs-mcp-${{ matrix.target }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.target }}
          path: ffs-mcp-${{ matrix.target }}*

  build-cli:
    name: Build CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          ## Linux builds (using cargo-zigbuild)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.31
            artifact_name: target/x86_64-unknown-linux-gnu/ci/ffs
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.31
            artifact_name: target/aarch64-unknown-linux-gnu/ci/ffs
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: target/x86_64-unknown-linux-musl/ci/ffs
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: target/aarch64-unknown-linux-musl/ci/ffs

          ## macOS builds
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: target/x86_64-apple-darwin/ci/ffs
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: target/aarch64-apple-darwin/ci/ffs

          ## Windows builds
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: target/x86_64-pc-windows-msvc/ci/ffs.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: target/aarch64-pc-windows-msvc/ci/ffs.exe

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Remove Git link.exe conflict
        if: contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          $gitLink = "C:\Program Files\Git\usr\bin\link.exe"
          if (Test-Path $gitLink) { Rename-Item $gitLink "link.exe.bak" }

      - name: Determine version
        id: version
        run: bash scripts/determine-version.sh

      - name: Set version
        run: make set-version V="${{ steps.version.outputs.version }}"

      - name: Install Rust
        run: rustup target add ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        if: contains(matrix.os, 'ubuntu')
        run: cargo install cargo-zigbuild

      - name: Build for Linux
        if: contains(matrix.os, 'ubuntu')
        run: |
          cargo zigbuild --profile ci --target ${{ matrix.zigbuild_target || matrix.target }} -p ffs-cli --features zlob
          cp "${{ matrix.artifact_name }}" "ffs-${{ matrix.target }}"

      - name: Build for macOS
        if: contains(matrix.os, 'macos')
        run: |
          MACOSX_DEPLOYMENT_TARGET="13" cargo build --profile ci --target ${{ matrix.target }} -p ffs-cli --features zlob
          cp "${{ matrix.artifact_name }}" "ffs-${{ matrix.target }}"

      - name: Ad-hoc sign macOS binary
        if: contains(matrix.os, 'macos')
        run: codesign --force --sign - "ffs-${{ matrix.target }}"

      - name: Build for Windows
        if: contains(matrix.os, 'windows')
        shell: bash
        run: |
          cargo build --profile ci --target ${{ matrix.target }} -p ffs-cli --features zlob
          cp "${{ matrix.artifact_name }}" "ffs-${{ matrix.target }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ffs-${{ matrix.target }}*

  release:
    name: Release
    needs: [build-c, build-mcp, build-cli]
    runs-on: ubuntu-latest
    # do not create releases on the forks (no permissions)
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login == 'dmtrKovalenko'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Flatten C library artifacts
        working-directory: ./binaries
        run: |
          # Move c-lib artifacts to root level
          for dir in c-lib-*/; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                mv "$file" "./$filename"
              fi
            done
            rmdir "$dir" 2>/dev/null || true
          done

      - name: Flatten MCP artifacts
        working-directory: ./binaries
        run: |
          for dir in mcp-*/; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                mv "$file" "./$filename"
              fi
            done
            rmdir "$dir" 2>/dev/null || true
          done

      - name: Flatten CLI artifacts
        working-directory: ./binaries
        run: |
          for dir in cli-*/; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                mv "$file" "./$filename"
              fi
            done
            rmdir "$dir" 2>/dev/null || true
          done

      - name: Generate checksums
        working-directory: ./binaries
        run: |
          ls -la
          for file in *; do
            if [ -f "$file" ] && [[ ! "$file" == *.sha256 ]]; then
              sha256sum "$file" > "${file}.sha256"
            fi
          done

      - name: Determine version
        id: version
        run: bash scripts/determine-version.sh

      - name: Upload Release Assets
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.version }}"
          tag_name: "${{ steps.version.outputs.is_release == 'true' && format('v{0}', steps.version.outputs.version) || steps.version.outputs.version }}"
          token: ${{ github.token }}
          files: ./binaries/*
          draft: false
          prerelease: ${{ steps.version.outputs.is_release != 'true' }}
          generate_release_notes: ${{ steps.version.outputs.is_release == 'true' }}
          body: |
            ${{ steps.version.outputs.is_release == 'true' && format('Release {0}', steps.version.outputs.version) || format('Nightly release from commit: {0}', github.sha) }}

            ## C FFI Library
            - `c-lib-{target}.so` / `.dylib` / `.dll` - C FFI library

            ## MCP Server
            - `ffs-mcp-{target}` - MCP server binary

            ## CLI
            - `ffs-{target}` - ffs CLI binary

            Install with:
            ```sh
            # MCP server
            curl -fsSL https://raw.githubusercontent.com/dmtrKovalenko/ffs.nvim/main/install-mcp.sh | bash
            ```

  crates-publish:
    name: Publish Rust crates
    needs: [build-c, build-mcp]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/download-version' || startsWith(github.ref, 'refs/tags/v')))
      || (github.event_name == 'pull_request' && github.head_ref == 'main')

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Determine version
        id: version
        run: bash scripts/determine-version.sh

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."
            exit 0
          fi

          make publish-crates V="${{ steps.version.outputs.version }}"